<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A">
        <animate attributeName="stop-color" values="#0F172A;#1E1B4B;#0F172A" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#0B1120;#020617" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#172554">
        <animate attributeName="stop-color" values="#172554;#0F172A;#172554" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Floating Elements -->
  <circle cx="700" cy="50" r="100" fill="#38BDF8" opacity="0.05">
    <animate attributeName="cy" values="50;70;50" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="200" r="150" fill="#C084FC" opacity="0.05">
    <animate attributeName="cy" values="200;180;200" dur="6s" repeatCount="indefinite" />
  </circle>
  <path d="M 650 150 L 750 250 L 550 250 Z" fill="#818CF8" opacity="0.03">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="7s" repeatCount="indefinite" />
  </path>

  <!-- Content -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="url(#text-grad)" filter="url(#glow)">Pratham Tiwari</text>
    <text x="0" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#94A3B8" letter-spacing="2">AI ENGINEER • FULL STACK DEVELOPER • MACHINE LEARNING</text>
    
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="40" height="4" fill="#38BDF8" rx="2">
        <animate attributeName="width" values="40;80;40" dur="3s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
