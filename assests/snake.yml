# ============================================================
# snake.yml — Generates the animated contribution snake graphic
# ============================================================
# HOW THIS WORKS:
#   1. This workflow runs on a schedule (daily) and also whenever
#      you push to your default branch, plus manually on demand.
#   2. It uses the community action `Platane/snk` to read your
#      public contribution graph and render it as an animated SVG.
#   3. The generated SVG is pushed to a branch called `output`,
#      which the README then embeds via a raw.githubusercontent.com
#      URL (see the "GitHub Contribution Snake" section in README.md).
#
# SETUP STEPS:
#   1. Save this file at: .github/workflows/snake.yml
#   2. Push it to your repository's default branch.
#   3. Go to Settings -> Actions -> General -> Workflow permissions
#      and enable "Read and write permissions" so the workflow can
#      push the generated SVG to the `output` branch.
#   4. Wait for the workflow to run once (or trigger it manually
#      from the Actions tab) — this creates the `output` branch.
#   5. Replace YOUR_GITHUB_USERNAME in README.md with your actual
#      username so the embedded image points to the right branch.
# ============================================================

name: Generate Snake Animation

on:
  schedule:
    # Runs every day at 00:00 UTC — edit the cron expression to change frequency
    - cron: "0 0 * * *"
  push:
    branches:
      - main   # change to "master" if that is your default branch
  workflow_dispatch: {}   # allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Generate the snake SVGs (dark + light variants) from
      # this repository owner's public contribution graph.
      - name: Generate contribution snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 2: Publish the generated files to the `output` branch
      # so they can be embedded in README.md via a raw content URL.
      - name: Push snake SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
